<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <title>PyCon US 2026</title>

  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="theme-color" content="#387ef5">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <base href="/">

  <link rel="icon" type="image/x-icon" href="assets/img/appicon.png">
  <link rel="apple-touch-icon" href="assets/img/appicon.png">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <app-root>
    <style>
      .app-shell {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #680579;
        flex-direction: column;
      }
      .app-shell img {
        max-width: 60%;
        max-height: 40%;
      }
      .app-shell-spinner {
        margin-top: 2rem;
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div class="app-shell">
      <img src="assets/img/splash.png" alt="PyCon US 2026">
      <div class="app-shell-spinner"></div>
    </div>
  </app-root>

  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
