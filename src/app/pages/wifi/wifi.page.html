<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title [class.title-visible]="showTitle">Wi-Fi</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="onScroll($event)">
  <div class="wifi-hero">
    <ion-icon name="wifi" class="wifi-hero-icon"></ion-icon>
    <h1>Connect to Wi-Fi</h1>
    <p>Free for all attendees</p>
  </div>

  <ion-card class="wifi-card">
    <ion-card-content>
      <div class="wifi-field">
        <span class="wifi-label">Network</span>
        <span class="wifi-value">PyConUS26</span>
      </div>
      <div class="wifi-divider"></div>
      <div class="wifi-field">
        <span class="wifi-label">Password</span>
        <span class="wifi-value">pyconLB2026</span>
      </div>
    </ion-card-content>
  </ion-card>

  <div class="wifi-actions ion-padding">
    <ion-button expand="block" (click)="copyPassword()">
      <ion-icon slot="start" name="copy-outline"></ion-icon>
      Copy Password
    </ion-button>
    <ion-button expand="block" fill="outline" (click)="openWifiSettings()">
      <ion-icon slot="start" name="settings-outline"></ion-icon>
      Open Wi-Fi Settings
    </ion-button>
  </div>

  <div class="ion-padding ion-text-center wifi-note">
    <ion-icon name="location-outline"></ion-icon>
    <ion-text color="medium">
      <p>Available throughout the Long Beach Convention &amp; Entertainment Center</p>
    </ion-text>
  </div>

  <div style="height: 80px"></div>
</ion-content>
