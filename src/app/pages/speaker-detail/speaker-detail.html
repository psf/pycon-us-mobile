<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="backHref"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="speaker-detail">
  <div class="speaker-background">
    <img class="speaker-banner" src="/assets/img/speaker-banner.png">
    <img class="speaker-image" [src]="speaker?.profilePic" [alt]="speaker?.name">
  </div>

  <div class="ion-padding-horizontal speaker-name">
    <h1>{{speaker?.name}}</h1>
  </div>

  <div class="ion-padding-horizontal speaker-detail" [innerHtml]="speaker?.about">
  </div>

  <div class="ion-padding-horizontal speaker-presentations">
    <h2>Presentations</h2>
    <ion-row>
      <ion-col *ngFor="let session of speaker?.sessions">
      <ion-card class="presentation-card">
        <ion-card-header>
          <ion-item detail="false" lines="none" class="speaker-item" routerLink="/app/tabs/schedule/session/{{session.id}}">
            <ion-label>
              <h2>{{session.name}}</h2>
              <span class="track-badge" [attr.data-track]="session.track | lowercase">{{session.track | trackName}}</span>
              <ion-text style="font-size: smaller;">{{session.day}} {{session.timeStart}} in {{session.location}}</ion-text>
            </ion-label>
          </ion-item>
        </ion-card-header>
      </ion-card>
      </ion-col>
    </ion-row>
  </div>
</ion-content>
