<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button color="medium"></ion-menu-button>
    </ion-buttons>
    <ion-title>Expo Hall</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="toggleSearch()" aria-label="Search booths">
        <ion-icon slot="icon-only" name="search"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <app-expo-hall-map #expoMap></app-expo-hall-map>
</ion-content>
