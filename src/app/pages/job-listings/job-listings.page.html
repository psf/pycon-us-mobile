<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
      <ion-button *ngIf="liveUpdateService.needsUpdate" (click)="liveUpdateService.performAutomaticUpdate()" fill="clear" aria-label="Install latest update">
        <ion-icon slot="icon-only" name="cloud-download-outline" color="primary"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title [class.title-visible]="showTitle">Job Listings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="onScroll($event)">
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="page-hero">
    <ion-icon name="briefcase" class="page-hero-icon"></ion-icon>
    <h1>Job Listings</h1>
    <p>Opportunities from PyCon US sponsors</p>
  </div>

  <ion-toolbar *ngIf="allListings.length > 0" class="search-toolbar">
    <ion-searchbar [(ngModel)]="searchText" [debounce]="250" showCancelButton="focus" inputmode="search" (ionClear)="resetSearch()" (ionCancel)="resetSearch()" (ionChange)="filterListings()" placeholder="Search sponsors"></ion-searchbar>
  </ion-toolbar>

  <div *ngIf="allListings.length === 0" class="ion-padding-horizontal">
    <p>No job listings have been posted yet. Check back closer to the conference!</p>
  </div>

  <div class="listings-container">
    <div *ngFor="let listing of listings" class="listing-card">
      <a class="sponsor-header"
         [routerLink]="'/app/tabs/sponsors/sponsor-detail/' + getSponsorSlug(listing.sponsor_name)">
        <img *ngIf="listing.sponsor_logo_url" [src]="listing.sponsor_logo_url" [alt]="listing.sponsor_name + ' logo'" class="sponsor-logo">
        <div class="sponsor-info">
          <h2 class="sponsor-name">{{listing.sponsor_name}}</h2>
          <span *ngIf="listing.sponsor_level" class="level-badge">{{listing.sponsor_level}}</span>
        </div>
        <ion-icon name="chevron-forward" class="sponsor-chevron" aria-hidden="true"></ion-icon>
      </a>

      <ion-list *ngIf="listing.roles?.length > 0" class="roles-list" lines="none">
        <ion-item *ngFor="let role of listing.roles" class="role-item" [button]="!!role.url" (click)="openUrl(role.url)" [detail]="!!role.url">
          <ion-icon name="briefcase-outline" slot="start" color="medium" class="role-icon"></ion-icon>
          <ion-label class="role-label">
            <span class="role-title">{{role.title}}</span>
            <span *ngIf="role.location" class="role-location">{{role.location}}</span>
          </ion-label>
        </ion-item>
      </ion-list>
    </div>
  </div>

  <div style="height: 80px"></div>
</ion-content>
