<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title [class.title-visible]="showTitle">Venues & Hours</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="onScroll($event)">
  <div class="venues-hero">
    <div class="venues-hero-title">
      <ion-icon name="location" class="venues-hero-icon"></ion-icon>
      <h1>Venues & Hours</h1>
    </div>
    <p>Long Beach Convention Center</p>
    <p class="venues-address">300 E Ocean Blvd, Long Beach, CA 90802</p>
  </div>

  <div class="venues-content ion-padding" *ngIf="sections.length">
    <ng-container *ngFor="let section of sections">
      <div class="venues-section" [innerHTML]="section.html"></div>
      <div class="venues-section-map" *ngIf="section.location">
        <app-location-map
          [label]="section.location.label"
          [sublabel]="section.location.sublabel"
          [floorTitle]="section.location.floorTitle"
          [thumbSrc]="section.location.thumbSrc"
          [fullSrc]="section.location.fullSrc"
          [pinXPct]="section.location.pinXPct"
          [pinYPct]="section.location.pinYPct">
        </app-location-map>
      </div>
    </ng-container>
  </div>

  <ion-list lines="full">
    <ion-item button="true" (click)="openUrl('https://maps.apple.com/?address=300+E+Ocean+Blvd,+Long+Beach,+CA+90802')" detail="true">
      <ion-icon slot="start" name="navigate-outline" color="primary"></ion-icon>
      <ion-label class="ion-text-wrap">
        <h2>Get Directions</h2>
        <p>Open in Maps</p>
      </ion-label>
    </ion-item>

    <ion-item button="true" routerLink="/app/tabs/conference-map" detail="true">
      <ion-icon slot="start" name="map-outline" color="primary"></ion-icon>
      <ion-label class="ion-text-wrap">
        <h2>Conference Map</h2>
        <p>Indoor venue layout</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div style="height: 80px"></div>
</ion-content>
