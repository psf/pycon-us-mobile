<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button color="medium"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
    <ion-buttons slot="end" *ngIf="mapView === 'expo-hall'">
      <ion-button (click)="toggleExpoSearch()" aria-label="Search booths">
        <ion-icon slot="icon-only" name="search"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [(ngModel)]="mapView" value="floor-plans">
      <ion-segment-button value="floor-plans">
        <ion-label>Floor Plans</ion-label>
      </ion-segment-button>
      <ion-segment-button value="3d-tour">
        <ion-label>3D Tour</ion-label>
      </ion-segment-button>
      <ion-segment-button value="expo-hall">
        <ion-label>Expo Hall</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true" [scrollY]="mapView === 'floor-plans'" scrollEvents="true">

  <ng-container *ngIf="mapView === 'floor-plans'">
    <div class="floor-plan-list">
      <button
        type="button"
        class="floor-plan-card"
        *ngFor="let plan of floorPlans"
        (click)="openFloorPlan(plan)"
        [attr.aria-label]="'Open ' + plan.title + ' floor plan'">
        <div class="floor-plan-thumb-wrap">
          <ion-img class="floor-plan-thumb" [src]="plan.thumb" [alt]="plan.title + ' thumbnail'"></ion-img>
          <div class="floor-plan-zoom-hint" aria-hidden="true">
            <ion-icon name="expand-outline"></ion-icon>
          </div>
        </div>
        <div class="floor-plan-meta">
          <div class="floor-plan-title">{{ plan.title }}</div>
          <div class="floor-plan-subtitle" *ngIf="plan.subtitle">{{ plan.subtitle }}</div>
        </div>
      </button>
    </div>
  </ng-container>

  <iframe
    *ngIf="mapView === '3d-tour'"
    id="map_frame"
    width="100%"
    height="100%"
    src="https://map.concept3d.com/?id=1802"
    frameborder="0"
    scrolling="no"
    allow="geolocation"
    title="PyCon US Venue 3D Map"
    style="border: 0; min-height: 100%;">
  </iframe>

  <app-expo-hall-map *ngIf="mapView === 'expo-hall'" #expoMap></app-expo-hall-map>

</ion-content>
