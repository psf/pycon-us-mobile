<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="close()" aria-label="Close floor plan">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true" class="floor-plan-modal-content">
  <pinch-zoom
    class="floor-plan-zoom"
    [autoZoomOut]="false"
    [doubleTap]="true"
    [wheel]="true"
    [draggableImage]="false"
    [limitZoom]="'original image size'"
    backgroundColor="#ffffff">
    <div class="floor-plan-canvas">
      <img
        [src]="imageSrc"
        [alt]="altText || title"
        decoding="async" />
      <div *ngIf="hasPin"
           class="floor-plan-pin"
           [style.left.%]="pinXPct"
           [style.top.%]="pinYPct"
           [attr.aria-label]="pinLabel || 'Location'">
        <span class="floor-plan-pin-pulse"></span>
        <span class="floor-plan-pin-dot"></span>
      </div>
    </div>
  </pinch-zoom>
</ion-content>
